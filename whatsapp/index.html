<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join WhatsApp | LOK Community</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/x-icon" href="/static/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/stiles.css" />
</head>

<body>
  <main class="section">
    <div class="container">
      <div class="text-center max-w-2xl mx-auto">
        <span class="badge badge-pink">Join the community</span>
        <h1 class="headline text-4xl md:text-5xl font-extrabold mt-4">Join WhatsApp</h1>
        <div class="mt-3" style="width:160px; height:6px; border-radius:999px; margin:5px auto 0; background:linear-gradient(90deg, var(--green), var(--green));"></div>

        <p class="muted mt-3">
          On desktop, scan this QR code with your phone camera to join.
        </p>

        <div class="card p-6 md:p-8 mt-6">
          <div class="whatsapp-qr-block">
            <img src="/static/images/whatsappQR.png" alt="WhatsApp QR code" class="whatsapp-qr" style="align-items: center;" />
            <p class="text-sm muted mt-3">Scan to join from your phone.</p>
          </div>

          <div class="mt-6 flex flex-wrap justify-center gap-3">
            <a class="btn btn-whatsapp" id="waOpen" href="https://chat.whatsapp.com/1XO0huo6kmQCgo7XJ6tije?mode=gi_t" target="_blank" rel="noopener">
              Open WhatsApp Link
            </a>
            <a class="btn btn-outline" href="/">Back home</a>
          </div>

          <p class="text-xs muted mt-4">
            If the QR doesn’t work, click “Open WhatsApp Link”.
          </p>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Auto-redirect mobile users straight to the WhatsApp invite link
    const waLink = "https://chat.whatsapp.com/1XO0huo6kmQCgo7XJ6tije?mode=gi_t";
    const isMobile = /Android|iPhone|iPad|iPod|Windows Phone/i.test(navigator.userAgent);

    if (isMobile) {
      window.location.href = waLink;
    }
  </script>
</body>
</html>
