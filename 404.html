<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Page not found | LOK Community</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="icon" type="image/x-icon" href="/static/images/favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/static/css/stiles.css" />

</head>

<body>

<main class="section">

<div class="container">

<div class="text-center max-w-2xl mx-auto">

<span class="badge badge-pink">Oops!</span>

<h1 class="headline text-6xl md:text-7xl font-extrabold mt-4">
404
</h1>

<div class="mt-3" style="width:160px; height:6px; border-radius:999px; margin:5px auto 0; background:linear-gradient(90deg, var(--gold), var(--pink));"></div>

<p class="muted mt-8">
You will be redirected to the homepage in 
<strong id="countdown">8</strong> seconds.
</p>

<p class="muted mt-2">
You will be redirected in 
</p>

<div class="mt-10">

<img
src="/static/images/loading.gif"
alt="Page not found illustration"
style="max-width:320px;margin:auto;opacity:.9;"
/>

</div>


</div>

</div>

</div>

</main>

<footer style="border-top:1px solid var(--line);">

<div class="divider-gold"></div>

<div class="container" style="padding-top:1rem; padding-bottom:1rem;">
<div class="text-xs muted">
© <span id="year"></span> LOK Community
</div>
</div>

</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

setTimeout(() => {
window.location.href = "/";
}, 8000);

let seconds = 8;
const countdown = document.getElementById("countdown");
const cancelBtn = document.getElementById("cancelRedirect");

let timer = setInterval(() => {
  seconds--;
  countdown.textContent = seconds;

  if (seconds <= 0) {
    clearInterval(timer);
    window.location.href = "/";
  }
}, 1000);

cancelBtn.addEventListener("click", () => {
  clearInterval(timer);
  countdown.textContent = "stopped";
});

</script>

</body>
</html>
